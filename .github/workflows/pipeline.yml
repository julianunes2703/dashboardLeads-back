name: Daily Marketing Pipeline

on:
  schedule:
    - cron: "0 9 * * *" # todo dia 09:00 UTC = 06:00 Brasil
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm ci

      - name: Criar token RD inicial
        run: |
          mkdir -p data
          cat <<EOF > data/rd-token.json
          {
            "access_token": "",
            "refresh_token": "${{ secrets.RD_REFRESH_TOKEN }}",
            "expires_at": 0
          }
          EOF
      - name: Debug tokens
        env:
            META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
            META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
        run: |
            echo "META_ACCESS_TOKEN length: ${#META_ACCESS_TOKEN}"
            echo "META_PAGE_TOKEN length: ${#META_PAGE_TOKEN}"
            echo "META_ACCESS_TOKEN starts with: ${META_ACCESS_TOKEN:0:3}"
            echo "META_PAGE_TOKEN starts with: ${META_PAGE_TOKEN:0:3}"

      - name: Rodar pipeline
        env:
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_FORM_ID: ${{ secrets.META_FORM_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}

          RD_CLIENT_ID: ${{ secrets.RD_CLIENT_ID }}
          RD_CLIENT_SECRET: ${{ secrets.RD_CLIENT_SECRET }}
          RD_REFRESH_TOKEN: ${{ secrets.RD_REFRESH_TOKEN }}
        run: npm run pipeline

      - name: Copiar JSON para o front
        run: |
          mkdir -p public
          cp data/dashboard-data.json public/dashboard-data.json

      - name: Commit dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/*.json public/dashboard-data.json logs/pipeline.log
          git diff --cached --quiet || git commit -m "update: dashboard data"
          git push